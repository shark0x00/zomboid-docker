networks:
  gaming:
    external: true

services:
  steamcmd:
    build:
      context: /root/gaming
      dockerfile: Dockerfile
    image: pz-steamcmd:custom
    #image: cm2network/steamcmd:root
    container_name: steamcmd
    restart: unless-stopped
    ports:
      - "16261:16261/udp"
      - "16262:16262/udp"
      - "127.0.0.1:27015:27015/tcp"
    volumes:
      - /root/gaming/mount/steamcmd_login_volume:/home/steam
      #- /root/gaming/mount/steamcmd_volume:/home/steam/steamcmd
    # Run directly as the steam user (no su needed)
    user: steam
    command: /home/steam/Steam/servers/projectzomboid/start-server.sh -servername PZWestSide
    #command: tail -f /dev/null
    security_opt:
      - seccomp:unconfined
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    networks:
      - gaming
